services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - UPLOAD_DIR=/app/uploads
    volumes:
      - upload_data:/app/uploads
    mem_limit: 4g
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  upload_data:
